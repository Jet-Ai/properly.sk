<!doctype html>
<html lang="sk">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ponuka | Properly</title>
    <meta name="description" content="Ukážková ponuka nehnuteľností Properly pre Bratislavu a okolie.">
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="assets/styles.css">
  </head>
  <body data-page="listings">
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="Properly home">
        <svg class="brand-mark" viewBox="0 0 42 42" aria-hidden="true">
          <path d="M8 34V15L21 7l13 8v19" /><path d="M15 34V18.5l6-3.6 6 3.6v5.7H20" /><path d="M20 24.2h7c4.5 0 7 2.6 7 6.1 0 3.6-2.7 6.1-7.2 6.1H15" />
        </svg>
        <span>Properly</span>
      </a>
      <nav class="main-nav" aria-label="Main navigation">
        <a class="active" href="listings.html" data-i18n="navListings">Ponuka</a>
        <a href="index.html#process" data-i18n="navProcess">Ako pracujeme</a>
        <a href="about.html" data-i18n="navAbout">O nás</a>
        <a href="contact.html" data-i18n="navContact">Kontakt</a>
      </nav>
      <div class="language-switcher" aria-label="Language switcher">
        <button type="button" data-lang="sk">SK</button>
        <button type="button" data-lang="en">EN</button>
        <button type="button" data-lang="tr">TR</button>
        <button type="button" data-lang="ru">RU</button>
      </div>
    </header>

    <main>
      <section class="page-hero">
        <div class="container compact-hero">
          <h1 data-i18n="listingsPageTitle">Ponuka nehnuteľností</h1>
          <p data-i18n="listingsPageText">Aktuálna a živá ponuka spravovaná priamo z Google tabuľky.</p>
        </div>
      </section>

      <section class="section-pad listings-page-section">
        <div class="container">
          <form class="filters-bar" id="listingFilters" aria-label="Listing filters">
            <label>
              <span data-i18n="filterMode">Režim</span>
              <select name="mode">
                <option value="">Všetko</option>
                <option value="kúpa">Kúpiť</option>
                <option value="prenájom">Prenajať</option>
              </select>
            </label>
            <label>
              <span data-i18n="fieldLocation">Lokalita</span>
              <select name="location">
                <option value="">Akákoľvek lokalita</option>
                <option value="Bratislava - Staré Mesto">Bratislava - Staré Mesto</option>
                <option value="Bratislava - Devín">Bratislava - Devín</option>
                <option value="Bratislava - Ružinov">Bratislava - Ružinov</option>
                <option value="Bratislava - Petržalka">Bratislava - Petržalka</option>
                <option value="Bratislava - Karlova Ves">Bratislava - Karlova Ves</option>
              </select>
            </label>
            <label>
              <span data-i18n="fieldPrice">Cena do</span>
              <select name="price">
                <option value="">Bez limitu</option>
                <option value="250000">250 000 €</option>
                <option value="500000">500 000 €</option>
                <option value="750000">750 000 €</option>
              </select>
            </label>
          </form>
          <div class="listing-toolbar">
            <p id="listingCount" aria-live="polite">Načítavam nehnuteľnosti...</p>
            <p class="sample-note" data-i18n="sheetReady">Prepojené live s Google Sheets databázou.</p>
          </div>
          <div class="listing-grid expanded" id="listingsGrid"></div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-grid">
        <a class="brand footer-brand" href="index.html" aria-label="Properly home"><svg class="brand-mark" viewBox="0 0 42 42" aria-hidden="true"><path d="M8 34V15L21 7l13 8v19" /><path d="M15 34V18.5l6-3.6 6 3.6v5.7H20" /><path d="M20 24.2h7c4.5 0 7 2.6 7 6.1 0 3.6-2.7 6.1-7.2 6.1H15" /></svg><span>Properly</span></a>
        <nav aria-label="Footer navigation"><a href="listings.html" data-i18n="navListings">Ponuka</a><a href="about.html" data-i18n="navAbout">O nás</a><a href="contact.html" data-i18n="navContact">Kontakt</a></nav>
        <a class="footer-domain" href="index.html">properly.sk</a>
      </div>
    </footer>
    
    <script src="assets/site.js"></script>

    <script>
      const spreadsheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT5iengHAyXXtKD2RbnOQiFzk_d9wAI3FjnFrAFlfxNlVPp1X_cxfpFRIioVmPTQ3qfyUluLjcPopVw/pub?output=csv';
      let allProperties = [];

      function parseCSV(text) {
        const lines = text.split('\n').filter(line => line.trim() !== '');
        if (lines.length === 0) return [];
        const headers = lines[0].split(',').map(h => h.trim().replace(/["'\r]/g, ''));
        
        return lines.slice(1).map(line => {
          const values = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.trim().replace(/["'\r]/g, ''));
          const obj = {};
          headers.forEach((header, i) => {
            obj[header] = values[i] || '';
          });
          return obj;
        });
      }

      function renderProperties(properties) {
        const gridElement = document.getElementById('listingsGrid');
        const countElement = document.getElementById('listingCount');
        gridElement.innerHTML = '';
        
        countElement.textContent = `Nájdených: ${properties.length} nehnuteľností`;

        if (properties.length === 0) {
          gridElement.innerHTML = `<p style="grid-column: 1/-1; color: var(--muted); padding: 3rem 0; text-align: center;">Žiadne nehnuteľnosti nevyhovujú zvoleným kritériám.</p>`;
          return;
        }

        properties.forEach(item => {
          const rawPrice = parseInt(item.Price) || 0;
          const formattedPrice = rawPrice > 0 ? rawPrice.toLocaleString('sk-SK') + (item.Status.toLowerCase() === 'prenájom' ? ' / mes' : ' €') : 'Cena na vyžiadanie';
          const displayImage = item.ImageURL1 || item.ImageURL || 'assets/images/placeholder.jpg';
          
          const propertyHtml = `
            <article class="property-card" style="background: var(--paper); border: 1px solid var(--mist-border); border-radius: var(--radius); overflow: hidden; display: flex; flex-direction: column; box-shadow: var(--shadow);">
              <div class="card-image-wrapper" style="position: relative; width: 100%; height: 240px; overflow: hidden;">
                <img src="${displayImage}" alt="${item.Title}" style="width: 100%; height: 100%; object-fit: cover;">
                <span class="badge" style="position: absolute; top: 1rem; left: 1rem; background-color: var(--lime-accent); color: #000000; font-weight: bold; padding: 0.35rem 0.75rem; border-radius: 4px; font-size: 0.85rem; text-transform: uppercase;">
                  ${item.Status || 'Kúpa'}
                </span>
              </div>
              <div class="card-content" style="padding: 1.5rem; flex: 1; display: flex; flex-direction: column; justify-content: space-between;">
                <div>
                  <h3 style="color: var(--purple-primary); margin: 0 0 0.5rem 0; font-family: var(--heading); font-size: 1.35rem;">${item.Title || 'Bez názvu'}</h3>
                  <p class="location" style="color: var(--muted); font-size: 0.95rem; margin: 0 0 1.25rem 0;">📍 ${item.Location || 'Neznáma lokalita'}</p>
                  
                  <div class="specs" style="display: flex; gap: 1.25rem; color: #FFFFFF; font-size: 0.9rem; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid rgba(255,255,255,0.08);">
                    <span>🛏️ ${item.Beds || 0} izb</span>
                    <span>🚿 ${item.Baths || 0} kúp</span>
                    <span>📐 ${item.SquareMeters || 0} m²</span>
                  </div>
                </div>
                
                <div class="card-footer" style="display: flex; justify-content: space-between; align-items: center; margin-top: auto;">
                  <span class="price" style="font-size: 1.3rem; font-weight: bold; color: #FFFFFF;">${formattedPrice}</span>
                  <a href="listing-detail.html?id=${String(item.ID).trim()}" class="btn-outline" style="border: 1px solid var(--purple-primary); color: #FFF; padding: 0.5rem 1rem; text-decoration: none; border-radius: 4px; font-size: 0.9rem; font-weight: 500; transition: all 0.2s ease;">Pozrieť detail</a>
                </div>
              </div>
            </article>
          `;
          gridElement.insertAdjacentHTML('beforeend', propertyHtml);
        });
      }

      function filterProperties() {
        const form = document.getElementById('listingFilters');
        const modeFilter = form.elements['mode'].value.toLowerCase();
        const locationFilter = form.elements['location'].value;
        const priceFilter = form.elements['price'].value;

        const filtered = allProperties.filter(item => {
          const matchesMode = !modeFilter || (item.Status && item.Status.toLowerCase() === modeFilter);
          const matchesLocation = !locationFilter || item.Location === locationFilter;
          
          let matchesPrice = true;
          if (priceFilter) {
            const itemPrice = parseInt(item.Price) || 0;
            matchesPrice = itemPrice <= parseInt(priceFilter);
          }

          return matchesMode && matchesLocation && matchesPrice;
        });

        renderProperties(filtered);
      }

      async function initDataEngine() {
        try {
          const response = await fetch(spreadsheetUrl);
          const csvText = await response.text();
          allProperties = parseCSV(csvText);
          renderProperties(allProperties);

          document.getElementById('listingFilters').addEventListener('change', filterProperties);
        } catch (error) {
          console.error('Data pipeline error:', error);
          document.getElementById('listingsGrid').innerHTML = `<p style="grid-column:1/-1; color: red; text-align:center;">Chyba pri sťahovaní ponuky z Google databázy.</p>`;
        }
      }

      window.addEventListener('DOMContentLoaded', initDataEngine);
    </script>
  </body>
</html>
