      <!-- Place this where the main property image currently sits in your layout -->
<div class="gallery-container">
  <div class="main-stage-image">
    <img id="detail-main-img" src="assets/images/placeholder.jpg" alt="Property image" style="width: 100%; height: 450px; object-fit: cover; border-radius: var(--radius);">
  </div>
  <!-- Thumbnails will display dynamically here -->
  <div id="detail-thumbnails" style="display: flex; gap: 0.75rem; margin-top: 1rem;"></div>
</div>

<script>
  const spreadsheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT5iengHAyXXtKD2RbnOQiFzk_d9wAI3FjnFrAFlfxNlVPp1X_cxfpFRIioVmPTQ3qfyUluLjcPopVw/pub?output=csv';

  // Extract ID from browser URL parameters (e.g., listing-detail.html?id=1)
  const urlParams = new URLSearchParams(window.location.search);
  const propertyId = urlParams.get('id');

  function parseCSV(text) {
    const lines = text.split('\n').filter(line => line.trim() !== '');
    const headers = lines[0].split(',').map(h => h.trim().replace(/["'\r]/g, ''));
    return lines.slice(1).map(line => {
      const values = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.trim().replace(/["'\r]/g, ''));
      const obj = {};
      headers.forEach((header, i) => { obj[header] = values[i] || ''; });
      return obj;
    });
  }

  async function loadDetailPage() {
    if (!propertyId) return;

    try {
      const response = await fetch(spreadsheetUrl);
      const csvText = await response.text();
      const properties = parseCSV(csvText);
      
      // Match the specific row using the ID
      const item = properties.find(p => p.ID === propertyId);
      
      if (item) {
        // Update Text Elements on the page dynamically
        // Ensure your HTML elements have matching IDs (id="detail-title", etc.)
        if(document.getElementById('detail-title')) document.getElementById('detail-title').textContent = item.Title;
        
        // Setup Image Gallery Logic
        const images = [item.ImageURL1 || item.ImageURL, item.ImageURL2, item.ImageURL3].filter(url => url && url.trim() !== '');
        const mainImg = document.getElementById('detail-main-img');
        const thumbContainer = document.getElementById('detail-thumbnails');
        
        if(images.length > 0) {
          mainImg.src = images[0]; // Set default primary image
          
          // If there are multiple pictures, generate clickable thumbnails
          if(images.length > 1) {
            thumbContainer.innerHTML = '';
            images.forEach((url, index) => {
              const thumb = document.createElement('img');
              thumb.src = url;
              thumb.style = "width: 80px; height: 60px; object-fit: cover; border-radius: 4px; cursor: pointer; border: 2px solid transparent;";
              if(index === 0) thumb.style.borderColor = "var(--purple-primary)";
              
              // Switch main stage image on click
              thumb.addEventListener('click', () => {
                mainImg.src = url;
                Array.from(thumbContainer.children).forEach(el => el.style.borderColor = "transparent");
                thumb.style.borderColor = "var(--purple-primary)";
              });
              thumbContainer.appendChild(thumb);
            });
          }
        }
      }
    } catch (error) {
      console.error('Error feeding gallery template:', error);
    }
  }

  window.addEventListener('DOMContentLoaded', loadDetailPage);
</script>
    </header>
